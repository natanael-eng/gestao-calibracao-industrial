name: Verificação Semanal de Calibração

on:
  push: # Roda sempre que você mudar o código
  schedule:
    - cron: '0 12 * * *' # Roda todo dia ao meio-dia (horário de Brasília aprox.)

jobs:
  verificacao:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Executar Checagem de Datas
        run: python main.py
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          USER_EMAIL: liranatan45@gmail.com
